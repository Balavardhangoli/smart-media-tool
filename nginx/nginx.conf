# ══════════════════════════════════════════════════════════
#  Smart Media Fetcher — Nginx Production Config
#  Features: Rate limiting · SSL · Gzip · Security headers
#            Upstream load balancing · Static file serving
# ══════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;      # Hide Nginx version

    # ── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── Rate Limiting Zones ───────────────────────────────
    # General API rate limit: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    # Download endpoint: stricter — 10 req/min
    limit_req_zone $binary_remote_addr zone=dl_limit:10m  rate=10r/m;
    # Auth endpoints: 5 req/min (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Connection limit ──────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: FastAPI backend ─────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;

        # ── SSL (Let's Encrypt) ───────────────────────────
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

        # ── File upload limit ─────────────────────────────
        client_max_body_size 10M;
        client_body_timeout  60s;
        client_header_timeout 15s;

        # ── Connection limits ─────────────────────────────
        limit_conn conn_limit 20;

        # ── Static Files (served directly by Nginx) ───────
        location /static/ {
            alias /usr/share/nginx/frontend/static/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Download/fetch endpoint (streaming, larger timeout) ──
        location /api/v1/download/fetch {
            limit_req zone=dl_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass             http://backend;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_buffering        off;           # Stream without buffering
            proxy_read_timeout     300s;          # Allow long downloads
            proxy_send_timeout     300s;
        }

        # ── General API endpoints ─────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 60s;
        }

        # ── Health check (no rate limit) ──────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Frontend (SPA) ────────────────────────────────
        location / {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Block common attack patterns ──────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|rb)$ {
            return 404;
        }
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Error pages ───────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Rate limit exceeded. Please slow down.","status":429}';
            add_header Content-Type application/json;
        }
        error_page 502 503 504 /5xx.json;
        location = /5xx.json {
            return 503 '{"error":"Service temporarily unavailable.","status":503}';
            add_header Content-Type application/json;
        }
    }

    # ── Dev HTTP server (no SSL — for local development) ──
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        location /static/ {
            alias /usr/share/nginx/frontend/static/;
            expires 1h;
        }

        location / {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
