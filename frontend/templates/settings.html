<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings — Smart Media Fetcher | Free Video Downloader</title>
<meta name="description" content="Manage your Smart Media Fetcher account settings. Free online media downloader for Instagram Reels, YouTube videos and more."/>
<meta name="robots" content="noindex"/>
<meta property="og:title" content="Settings — Smart Media Fetcher | Free Video Downloader"/>
<meta property="og:description" content="Manage your Smart Media Fetcher account settings. Free online media downloader for Instagram Reels, YouTube videos and more."/>
<meta property="og:url" content="https://smart-media-fetcher.onrender.com/"/>
<meta name="theme-color" content="#fbbf24"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0c0c0f;--bg2:#111116;--surface:#16161e;--card:#1a1a24;--border:rgba(255,255,255,0.06);--border-hi:rgba(255,200,70,0.3);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--green:#34d399;--red:#f87171;--text:#e8e8ee;--text-2:#9999b3;--text-3:#55556e;--radius:16px;}
[data-theme="light"]{--bg:#f5f5f8;--bg2:#ebebf0;--surface:#ffffff;--card:#fafafa;--border:rgba(0,0,0,0.08);--text:#1a1a2e;--text-2:#555570;--text-3:#aaaacc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;}
.wrapper{max-width:760px;margin:0 auto;padding:32px 20px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.back-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Cabinet Grotesk',sans-serif;text-decoration:none;transition:all 0.2s;}
.back-btn:hover{border-color:var(--amber);color:var(--amber);}
.page-title{font-size:24px;font-weight:800;}
.page-title span{color:var(--amber);}
.theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;display:grid;place-items:center;font-size:16px;transition:all 0.2s;}
.theme-btn:hover{border-color:var(--amber);}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:28px;}
.tab-btn{flex:1;padding:10px;border-radius:10px;border:none;background:none;color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Cabinet Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.section-icon{width:36px;height:36px;border-radius:10px;background:var(--amber-dim);display:grid;place-items:center;font-size:18px;}
.section-title{font-size:16px;font-weight:800;}
.section-sub{font-size:12px;color:var(--text-2);margin-top:2px;}
.avatar-row{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.avatar-big{width:72px;height:72px;border-radius:18px;display:grid;place-items:center;font-size:28px;font-weight:900;color:#0c0c0f;flex-shrink:0;}
.avatar-info h3{font-size:18px;font-weight:800;}
.avatar-info p{font-size:13px;color:var(--text-2);margin-top:4px;}



.field{margin-bottom:16px;}
.field-label{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.field-input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Cabinet Grotesk',sans-serif;outline:none;transition:border-color 0.2s;}
.field-input:focus{border-color:var(--amber);}
.field-input:disabled{opacity:0.5;cursor:not-allowed;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-select{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Cabinet Grotesk',sans-serif;outline:none;cursor:pointer;transition:border-color 0.2s;}
.field-select:focus{border-color:var(--amber);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;padding-bottom:0;}
.toggle-info h4{font-size:14px;font-weight:700;}
.toggle-info p{font-size:12px;color:var(--text-2);margin-top:3px;}
.toggle{width:44px;height:24px;background:var(--border);border-radius:100px;cursor:pointer;position:relative;transition:background 0.2s;border:none;flex-shrink:0;}
.toggle.on{background:var(--amber);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(20px);}
.accent-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.accent-btn{width:36px;height:36px;border-radius:10px;border:3px solid transparent;cursor:pointer;transition:all 0.2s;}
.accent-btn:hover,.accent-btn.selected{border-color:white;transform:scale(1.1);}
.save-btn{width:100%;padding:13px;border-radius:12px;background:var(--amber);border:none;color:#0c0c0f;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:background 0.2s;margin-top:20px;}
.save-btn:hover{background:#f59e0b;}
.strength-bar{height:6px;border-radius:100px;background:var(--border);margin-top:8px;overflow:hidden;}
.strength-fill{height:100%;border-radius:100px;transition:all 0.4s;width:0;}
.strength-text{font-size:12px;font-weight:600;margin-top:6px;}
.pw-rules{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;}
.pw-rules-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.pw-rule{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3);margin-bottom:6px;transition:color 0.2s;}
.pw-rule:last-child{margin-bottom:0;}
.pw-rule.pass{color:var(--green);}
.pw-rule-icon{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--text-3);display:grid;place-items:center;font-size:9px;flex-shrink:0;transition:all 0.2s;}
.pw-rule.pass .pw-rule-icon{background:var(--green);border-color:var(--green);color:#000;}
.pw-input-wrap{position:relative;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);font-size:16px;padding:0;}
.pw-toggle:hover{color:var(--text);}
.pw-match{font-size:12px;font-weight:600;margin-top:6px;}
.pw-match.ok{color:var(--green);}
.pw-match.fail{color:var(--red);}
.security-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;}
.security-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.security-row:last-child{border-bottom:none;padding-bottom:0;}
.security-label{font-size:12px;color:var(--text-2);}
.security-value{font-size:12px;font-weight:600;}
.sec-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;}
.sec-badge.ok{background:rgba(52,211,153,0.15);color:var(--green);}
.sec-badge.warn{background:rgba(251,191,36,0.15);color:var(--amber);}
.danger-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.danger-title{font-size:16px;font-weight:800;color:var(--text);}
.danger-btn{width:100%;padding:13px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.3s;margin-top:8px;text-align:left;display:flex;align-items:center;gap:10px;}
.danger-btn:hover{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.4);color:var(--red);}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;visibility:hidden;transition:all 0.2s;}
.confirm-overlay.show{opacity:1;visibility:visible;}
.confirm-modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;max-width:400px;width:90%;text-align:center;transform:scale(0.95);transition:transform 0.2s;}
.confirm-overlay.show .confirm-modal{transform:scale(1);}
.confirm-icon-wrap{width:64px;height:64px;border-radius:20px;margin:0 auto 18px;display:grid;place-items:center;font-size:28px;}
.confirm-icon-wrap.warn{background:rgba(251,191,36,0.12);}
.confirm-icon-wrap.danger{background:rgba(248,113,113,0.1);}
.confirm-title{font-size:19px;font-weight:900;margin-bottom:8px;letter-spacing:-0.3px;}
.confirm-sub{font-size:13px;color:var(--text-2);line-height:1.7;margin-bottom:8px;}
.confirm-note{font-size:11px;color:var(--text-3);margin-bottom:24px;padding:8px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border);}
.confirm-btns{display:flex;gap:10px;}
.confirm-cancel{flex:1;padding:13px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.2s;}
.confirm-cancel:hover{border-color:var(--amber);color:var(--amber);}
.confirm-ok{flex:1;padding:13px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.3s;}
.confirm-ok:hover{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.4);color:var(--red);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:transform 0.3s;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:rgba(52,211,153,0.4);color:var(--green);}
.toast.error{border-color:rgba(248,113,113,0.4);color:var(--red);}
.go-home{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;background:var(--amber);color:#0c0c0f;font-size:14px;font-weight:700;text-decoration:none;}
@media(max-width:768px){
  .wrapper{padding:24px 16px;}
}
@media(max-width:580px){
  .wrapper{padding:16px 14px 40px;}
  .page-header{flex-wrap:wrap;gap:10px;}
  .page-title{font-size:18px;}
  .tabs{flex-wrap:wrap;gap:4px;}
  .tab-btn{flex:none;width:calc(50% - 4px);padding:8px 6px;font-size:12px;}
  .field-row{grid-template-columns:1fr;}
  .section{padding:16px;}
  .avatar-row{flex-direction:column;align-items:flex-start;gap:14px;}
  .avatar-big{width:60px;height:60px;font-size:24px;}
  
  .security-info{padding:12px;}
  .otp-inputs{gap:6px;}
  .otp-input{width:40px;height:46px;font-size:18px;}
  .accent-grid{gap:8px;}
  .accent-btn{width:32px;height:32px;}
  .save-btn{padding:12px;}
  .danger-btn{padding:12px;}
}
@media(max-width:360px){
  .tab-btn{font-size:11px;padding:7px 4px;}
  .section-title{font-size:14px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="page-header">
    <a href="/" class="back-btn">← Back</a>
    <h1 class="page-title">⚙️ <span>Settings</span></h1>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
  <div id="mainContent"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const API='/api/v1';
let isDark=localStorage.getItem('smf_theme')!=='light';
let prefs=JSON.parse(localStorage.getItem('smf_prefs')||'{}');
const ACCENTS=['#fbbf24','#38bdf8','#34d399','#a78bfa','#f87171','#fb923c'];

function applyTheme(){document.documentElement.setAttribute('data-theme',isDark?'dark':'light');document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';localStorage.setItem('smf_theme',isDark?'dark':'light');}
applyTheme();
document.getElementById('themeBtn').onclick=()=>{isDark=!isDark;applyTheme();const s=document.getElementById('themeSelect');if(s)s.value=isDark?'dark':'light';};

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=(type==='success'?'✅ ':'❌ ')+msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
function getUser(){try{return JSON.parse(localStorage.getItem('smf_user')||'{}');}catch(e){return{};}}
function getToken(){return localStorage.getItem('smf_token');}
function switchTab(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+tab));}
function pickAccent(c,btn){prefs.accent=c;document.querySelectorAll('.accent-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
function togglePref(key,btn){btn.classList.toggle('on');prefs[key]=btn.classList.contains('on');}
function togglePw(id,btn){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}else{inp.type='password';btn.textContent='👁';}}

function checkStrength(val){
  const fill=document.getElementById('strengthFill');
  const text=document.getElementById('strengthText');
  const rules=document.getElementById('pwRules');
  if(!val){fill.style.width='0';text.textContent='';if(rules)rules.style.display='none';return;}
  if(rules)rules.style.display='block';
  const checks={len:val.length>=8,upper:/[A-Z]/.test(val),num:/[0-9]/.test(val),special:/[^A-Za-z0-9]/.test(val)};
  Object.entries(checks).forEach(([k,p])=>{const el=document.getElementById('rule-'+k);if(el)el.classList.toggle('pass',p);});
  let score=0;
  if(checks.len)score++;
  if(checks.upper)score++;
  if(checks.num)score++;
  if(checks.special)score++;
  if(val.length>=12)score++;
  const levels=[{w:'20%',c:'#f87171',l:'Very weak'},{w:'40%',c:'#fb923c',l:'Weak'},{w:'60%',c:'#fbbf24',l:'Fair'},{w:'80%',c:'#34d399',l:'Good'},{w:'100%',c:'#10b981',l:'Strong ✅'}];
  const lv=levels[Math.min(score-1,4)]||levels[0];
  fill.style.width=lv.w;fill.style.background=lv.c;text.style.color=lv.c;text.textContent=lv.l;
}

function checkMatch(){
  const newP=document.getElementById('newPass').value;
  const conf=document.getElementById('confirmPass').value;
  const el=document.getElementById('matchText');
  if(!conf){el.textContent='';return;}
  if(newP===conf){el.textContent='✅ Passwords match';el.className='pw-match ok';}
  else{el.textContent='❌ Passwords do not match';el.className='pw-match fail';}
}
function changeTheme(val){isDark=val==='dark';applyTheme();}

async function saveProfile(){
  const username=document.getElementById('usernameInput').value.trim();
  if(!username){showToast('Username cannot be empty','error');return;}
  if(username.length<2){showToast('Username must be at least 2 characters','error');return;}

  const btn=document.querySelector('[onclick="saveProfile()"]');
  if(btn){btn.textContent='⏳ Saving...';btn.disabled=true;}

  try{
    // Call backend to update username
    const res=await fetch(`${API}/auth/update-profile`,{
      method:'PUT',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+getToken()},
      body:JSON.stringify({username:username})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.detail||'Update failed.');

    // Update localStorage with new data
    const user=getUser();
    user.username=username;
    localStorage.setItem('smf_user',JSON.stringify(user));

    showToast('✅ Profile updated successfully!');

    // Update preview
    const namePreview=document.getElementById('namePreview');
    if(namePreview)namePreview.textContent=username;

  }catch(e){
    showToast(e.message,'error');
  }finally{
    if(btn){btn.textContent='Save Profile';btn.disabled=false;}
  }
}

async function changePassword(){
  const current=document.getElementById('currentPass').value;
  const newP=document.getElementById('newPass').value;
  const confirm=document.getElementById('confirmPass').value;
  if(!current){showToast('Enter your current password','error');return;}
  if(!newP){showToast('Enter a new password','error');return;}
  if(newP.length<8){showToast('Password must be at least 8 characters','error');return;}
  if(!/[A-Z]/.test(newP)){showToast('Password needs at least 1 uppercase letter','error');return;}
  if(!/[0-9]/.test(newP)){showToast('Password needs at least 1 number','error');return;}
  if(newP===current){showToast('New password must be different from current password','error');return;}
  if(newP!==confirm){showToast('Passwords do not match','error');return;}
  const btn=document.getElementById('changePwBtn');
  if(btn){btn.textContent='⏳ Updating...';btn.disabled=true;}
  try{
    const res=await fetch(`${API}/auth/change-password`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+getToken()},
      body:JSON.stringify({current_password:current,new_password:newP})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.detail||'Password update failed.');
    showToast('Password updated successfully!');
    ['currentPass','newPass','confirmPass'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.value='';el.type='password';}
    });
    document.querySelectorAll('.pw-toggle').forEach(b=>b.textContent='👁');
    const sf=document.getElementById('strengthFill');if(sf)sf.style.width='0';
    const st=document.getElementById('strengthText');if(st)st.textContent='';
    const mt=document.getElementById('matchText');if(mt)mt.textContent='';
    const pr=document.getElementById('pwRules');if(pr)pr.style.display='none';
    const lc=document.getElementById('lastChanged');
    if(lc){lc.textContent='Just now';localStorage.setItem('smf_pw_changed',Date.now());}
  }catch(e){showToast(e.message,'error');}
  finally{if(btn){btn.textContent='🔒 Update Password';btn.disabled=false;}}
}

function savePrefs(){
  prefs.quality=document.getElementById('prefQuality').value;
  prefs.format=document.getElementById('prefFormat').value;
  localStorage.setItem('smf_prefs',JSON.stringify(prefs));
  showToast('Preferences saved!');
}

function saveAppearance(){localStorage.setItem('smf_prefs',JSON.stringify(prefs));showToast('Appearance saved!');}

let _confirmAction = null;

function confirmClearHistory() {
  _confirmAction = 'clear';
  const wrap = document.getElementById('confirmIconWrap');
  if (wrap) { wrap.className = 'confirm-icon-wrap warn'; }
  document.getElementById('confirmIcon').textContent  = '🗑️';
  document.getElementById('confirmTitle').textContent = 'Clear download history?';
  document.getElementById('confirmSub').textContent   = 'All your saved download records will be removed from this device.';
  document.getElementById('confirmNote').textContent  = '⚠️ This action cannot be undone.';
  document.getElementById('confirmOkBtn').textContent = 'Yes, clear history';
  document.getElementById('confirmOverlay').classList.add('show');
}

function confirmDeleteAccount() {
  _confirmAction = 'delete';
  const wrap = document.getElementById('confirmIconWrap');
  if (wrap) { wrap.className = 'confirm-icon-wrap danger'; }
  document.getElementById('confirmIcon').textContent  = '👤';
  document.getElementById('confirmTitle').textContent = 'Delete your account?';
  document.getElementById('confirmSub').innerHTML     = 'Your account, login details, and all associated data will be permanently removed.';
  document.getElementById('confirmNote').innerHTML    = '⚠️ This cannot be reversed. You will need to create a new account to use this service again.';
  document.getElementById('confirmOkBtn').textContent = 'Yes, delete my account';
  document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
  _confirmAction = null;
}

async function executeConfirm() {
  closeConfirm();
  if (_confirmAction === 'clear') {
    const user = getUser();
    const key  = 'smf_history_' + (user.username || user.email || 'user').replace(/[^a-z0-9]/gi, '_');
    localStorage.setItem(key, '[]');
    showToast('Download history cleared!');
  } else if (_confirmAction === 'delete') {
    try {
      const res = await fetch(`${API}/auth/delete-account`, {
        method:  'DELETE',
        headers: { Authorization: 'Bearer ' + getToken() },
      });
      if (!res.ok) throw new Error('Failed');
      localStorage.clear();
      showToast('Account deleted. Redirecting...');
      setTimeout(() => window.location.href = '/', 1500);
    } catch(e) {
      showToast('Could not delete account. Please try again.', 'error');
    }
  }
}

// Close confirm dialog when clicking overlay background
document.addEventListener('click', e => {
  const overlay = document.getElementById('confirmOverlay');
  if (overlay && e.target === overlay) closeConfirm();
});

function renderPage(){
  const token=getToken();
  const content=document.getElementById('mainContent');
  if(!token){content.innerHTML='<div style="text-align:center;padding:80px 20px"><h2 style="font-size:22px;font-weight:800;margin-bottom:12px">🔒 Sign in to access settings</h2><p style="color:var(--text-2);margin-bottom:24px">You need to be logged in.</p><a href="/" class="go-home">← Go back and log in</a></div>';return;}
  const user=getUser();
  const username=user.username||'User';
  const email=user.email||'';
  const initial=username.charAt(0).toUpperCase();
  const accent=prefs.accent||'#fbbf24';
  content.innerHTML=`
    <div class="tabs">
